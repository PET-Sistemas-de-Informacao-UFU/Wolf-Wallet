name: 🐺 Keep Alive + Sync

on:
  schedule:
    # A cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    # Streamlit Community Cloud hiberna após 12h SEM tráfego.
    # Intervalo de 6h garante que nunca atinge as 12h de inatividade.
    # Ao acordar o app (cold start), a auto-sync é disparada automaticamente.
    - cron: "0 */6 * * *"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  ping-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Wolf Wallet (wake up → triggers auto-sync on cold start)
        run: |
          echo "🐺 Acordando Wolf Wallet..."

          # 1. Health check — endpoint interno do Streamlit (leve, direto)
          echo "→ Verificando /_stcore/health..."
          HEALTH=$(curl -sS --max-time 120 \
            "https://wolf-wallet.streamlit.app/_stcore/health" || echo "FAIL")
          echo "  Health: $HEALTH"

          # 2. Ping na raiz com follow-redirect para simular visita real
          echo "→ Pingando página principal..."
          HTTP_CODE=$(curl -sS -L -o /dev/null -w "%{http_code}" \
            --max-time 120 \
            "https://wolf-wallet.streamlit.app/")
          echo "  HTTP: $HTTP_CODE"

          # 3. Segundo health check após estabilizar (garante que o app está warm)
          sleep 10
          HEALTH2=$(curl -sS --max-time 30 \
            "https://wolf-wallet.streamlit.app/_stcore/health" || echo "FAIL")
          echo "  Health (confirmação): $HEALTH2"

          # 4. Resultado
          if [ "$HEALTH2" = "ok" ]; then
            echo "✅ App está acordado e saudável"
          else
            echo "⚠️ App pode não ter acordado corretamente (health=$HEALTH2)"
            exit 1
          fi
