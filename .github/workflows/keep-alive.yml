name: 🐺 Keep Alive + Sync

on:
  schedule:
    # A cada 6 horas (00:00, 06:00, 12:00, 18:00 UTC)
    # Streamlit Community Cloud hiberna após 12h SEM tráfego.
    # Intervalo de 6h garante que nunca atinge as 12h de inatividade.
    # Ao acordar o app (cold start), a auto-sync é disparada automaticamente.
    - cron: "0 */6 * * *"
  workflow_dispatch: # permite rodar manualmente pelo GitHub

jobs:
  ping-and-sync:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Playwright
        run: |
          npm init -y > /dev/null 2>&1
          npm install playwright > /dev/null 2>&1
          npx playwright install chromium --with-deps > /dev/null 2>&1

      - name: Wake up Wolf Wallet with headless browser
        run: |
          cat << 'SCRIPT' > ping.mjs
          import { chromium } from 'playwright';

          const APP_URL = 'https://wolf-wallet.streamlit.app/';
          const TIMEOUT = 120_000; // 2 min (cold start pode levar tempo)

          (async () => {
            const browser = await chromium.launch();
            const page = await browser.newPage();

            console.log('🐺 Abrindo Wolf Wallet no headless browser...');

            try {
              // 1. Navega para o app
              const response = await page.goto(APP_URL, {
                waitUntil: 'networkidle',
                timeout: TIMEOUT,
              });
              console.log(`➡️  Status: ${response?.status()}`);

              // 2. Se o app está dormindo, clica no botão de acordar
              const wakeBtn = page.getByRole('button', { name: /get this app back up/i });
              if (await wakeBtn.isVisible({ timeout: 5000 }).catch(() => false)) {
                console.log('💤 App estava dormindo — acordando...');
                await wakeBtn.click();
                await page.waitForLoadState('networkidle', { timeout: TIMEOUT });
                console.log('✅ App acordado com sucesso!');
              } else {
                console.log('✅ App já estava acordado!');
              }

              // 3. Aguarda 15s para o Streamlit estabilizar (WebSocket + auto-sync)
              await page.waitForTimeout(15000);

              // 4. Tira screenshot para debug (salvo como artifact)
              await page.screenshot({ path: 'screenshot.png', fullPage: true });
              console.log('📸 Screenshot salvo');

              // 5. Verifica se o app carregou algo do Streamlit
              const title = await page.title();
              console.log(`📄 Título da página: "${title}"`);

            } catch (err) {
              console.error('❌ Erro:', err.message);
              // Tenta screenshot mesmo com erro
              await page.screenshot({ path: 'screenshot-error.png' }).catch(() => {});
              process.exit(1);
            } finally {
              await browser.close();
            }
          })();
          SCRIPT

          node ping.mjs

      - name: Upload screenshot (debug)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: wolf-wallet-screenshot
          path: screenshot*.png
          retention-days: 3
